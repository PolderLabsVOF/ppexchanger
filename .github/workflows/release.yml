# Release workflow — builds the single-binary tarball + SHA256SUMS and
# publishes them to a GitHub release whenever a `v*` tag is pushed. The
# install.sh lives at the repo root and is uploaded alongside the artifacts
# so the one-line `curl | bash` install always fetches the script that
# matches the binary it installs.
#
# One asset per (target triple) is published. The installer matches the
# asset to the host machine and rejects anything outside the published set.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist or will be created from current commit)'
        required: false
        default: ''

permissions:
  contents: write   # required for gh release create / upload

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (host)
        uses: dtolnay/rust-toolchain@stable

      - name: Add target triple
        run: |
          # dtolnay/rust-toolchain@stable with `targets:` is unreliable for
          # non-host triples on aarch64 (the rustup call only seems to
          # register the host triple). Add it explicitly so rustc has the
          # aarch64 std library available for codegen.
          rustup target add "${{ matrix.target }}" --verbose
          echo "--- rustup target list (installed) ---"
          rustup target list --installed
          echo "--- rustc verbose version (target triple) ---"
          rustc --version --verbose

      - name: Cache cargo registry (per-target key)
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          # Per-target prefix-key — sharing the cache across matrix entries
          # was restoring x86_64 compiled artifacts into the aarch64 build
          # dir. Each target now has its own cache namespace.
          prefix-key: ${{ matrix.target }}-v5
          cache-targets: false
          cache-workspace-crates: false

      - name: Build release binary (stripped)
        env:
          # Per-target target/ so each matrix entry has its own cache
          # space and Swatinem/rust-cache can't accidentally cross-pollinate
          # x86_64 object files into the aarch64 build.
          CARGO_TARGET_DIR: target-${{ matrix.target }}
        run: |
          # NB: no --locked here. On a cold cargo cache, a fresh target
          # triple triggers a registry update which --locked would block.
          # The dep list is version-pinned and small, so an unlocked
          # build can only add (not change) entries — safe for releases.
          cargo build --release --target "${{ matrix.target }}"
          mkdir -p staging/bin
          cp "target-${{ matrix.target }}/${{ matrix.target }}/release/lanchat" staging/bin/lanchat
          strip "staging/bin/lanchat" || true   # best-effort — strip(1) may be absent for some targets
          ls -la staging/bin/lanchat

      - name: Compose tarball + checksums
        env:
          TAG_BARE: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          TAG_BARE="${TAG_BARE#v}"
          ASSET="lanchat-${TAG_BARE}-${TARGET}.tar.gz"
          tar -C staging -czf "${ASSET}" bin/lanchat
          # SHA256SUMS covers the tarball + the install script so the
          # installer's checksum check matches what's published.
          sha256sum "${ASSET}" install.sh > SHA256SUMS
          cat SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanchat-${{ matrix.target }}
          path: |
            *.tar.gz
            SHA256SUMS
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: false   # keep each target in its own subdir

      - name: Compose single SHA256SUMS across all targets
        run: |
          # Each matrix job wrote its own SHA256SUMS containing one
          # tarball + the install.sh entry. Concatenate, then dedupe by
          # filename (the install.sh line repeats once per target but it
          # hashes identically so sort -u collapses it).
          cat dist/*/SHA256SUMS | sort -u -k2 > SHA256SUMS
          cat SHA256SUMS

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: lanchat ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            SHA256SUMS
            install.sh
            dist/**/*.tar.gz
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
